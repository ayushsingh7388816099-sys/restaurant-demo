header {
background:#111;

.slider {
position:relative;
height:100vh;
overflow:hidden;
}
.slider img {
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:slide 12s infinite;
}
.slider img:nth-child(2){animation-delay:4s;}
.slider img:nth-child(3){animation-delay:8s;}

@keyframes slide {
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

section {padding:40px;text-align:center;}

.menu {

flex-wrap:wrap;
}

}
.item img {
width:200px;
border-radius:10px;
}

margin:5px;
}
