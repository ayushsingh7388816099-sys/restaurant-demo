<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Restaurant</title>

<style>
body {margin:0;font-family:Arial;}

header {
background:#111;
color:white;
padding:15px;
text-align:center;
}

.slider {
position:relative;
height:100vh;
overflow:hidden;
}
.slider img {
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:slide 12s infinite;
}
.slider img:nth-child(2){animation-delay:4s;}
.slider img:nth-child(3){animation-delay:8s;}

@keyframes slide {
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

section {padding:40px;text-align:center;}

.menu {
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}
.item {
background:#f5f5f5;
padding:15px;
border-radius:10px;
}
.item img {
width:200px;
border-radius:10px;
}

form input, form button {
padding:10px;
margin:5px;
}

.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Kohinoor Restaurant</h1>
</header>

<!-- Slider -->
<div class="slider">
<img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
<img src="https://images.unsplash.com/photo-1498654896293-37aacf113fd9">
</div>

<!-- Menu -->
<section>
<h2>Our Special Menu</h2>
<div class="menu">
<div class="item">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>Paneer Tikka</h3>
</div>
<div class="item">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<h3>Biryani</h3>
</div>
</div>
</section>

<!-- Booking -->
<section>
<h2>Book a Table</h2>
<form>
<input type="text" placeholder="Name" required><br>
<input type="number" placeholder="Guests" required><br>
<input type="date" required><br>
<button type="submit">Book Now</button>
</form>
</section>

<!-- Reviews -->
<section>
<h2>Customer Reviews</h2>
<p>⭐️⭐️⭐️⭐️⭐️ Amazing food!</p>
<p>⭐️⭐️⭐️⭐️ Great service</p>
</section>

<!-- Map -->
<h2 style="text-align:center;">Our Location</h2>
<iframe src="https://www.google.com/maps?q=Gorakhpur&output=embed"
width="100%" height="300"></iframe>

<!-- WhatsApp -->
<a href="https://wa.me/919876543210" target="_blank" class="whatsapp">
💬 WhatsApp
</a>

</body>
</html>
